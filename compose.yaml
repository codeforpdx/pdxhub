services:
  app:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: pdx-hub:local
    init: true
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: pdx-hub:dev
    init: true
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .git/
            - .next/
            - coverage/
            - node_modules/
            - Dockerfile
            - compose.yaml
            - bun.lock
            - package-lock.json
            - package.json
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
